services:
  php:
    build:
      context: ./docker/php
    container_name: alex_portfolio_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - symfony_var:/var/www/html/var
      - symfony_vendor:/var/www/html/vendor
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      MAILER_DSN: smtp://mailpit:1025
      DATABASE_URL: "mysql://symfony:symfony@mysql:3306/symfony?serverVersion=8.4&charset=utf8mb4"
    depends_on:
      - mysql
      - mailpit

  nginx:
    image: nginx:1.27-alpine
    container_name: alex_portfolio_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - symfony_var:/var/www/html/var:ro
      - symfony_vendor:/var/www/html/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  mysql:
    image: mysql:8.4
    container_name: alex_portfolio_mysql
    environment:
      MYSQL_DATABASE: symfony
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: alex_portfolio_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - mysql

  mailpit:
    image: axllent/mailpit:latest
    container_name: alex_portfolio_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 5000
    restart: unless-stopped

volumes:
  mysql_data:
  symfony_var:
  symfony_vendor: