security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        users_in_memory:
            memory:
                users:
                    test@test.fr:
                        password: '$2y$13$Iwd0suZ41b7BbZ421FiOreXcqASSKsp4bRpzABwWmB0hXWX0lmvCm'
                        roles: ['ROLE_USER']

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: users_in_memory
            custom_authenticators:
                - App\Security\LoginFormAuthenticator

            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/admin, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10